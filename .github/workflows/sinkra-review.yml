name: Sinkra Review

# Wires RBKunnela/sinkra-action — a 9-agent council that reviews every PR
# for architecture, code quality, data, ops, product, and quality concerns.
#
# Verdict is delivered as a GitHub check-run. The verbatim check context
# name (as it appears in `gh pr checks`) is:
#
#   Sinkra Review / sinkra-action verdict
#
# To make this a required status check on main, add that exact string to
# branch protection's required_status_checks.contexts AFTER this workflow
# has run at least once on a merged commit.
#
# Governance: chore-style CI wiring; the full review chain (sm/po/dev/qa/devops)
# still applies. Only @devops merges. See
# `.claude/rules/automated-pr-merge-authority.md` (in AIOX-Enterprise).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: sinkra-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  sinkra-review:
    name: sinkra-action verdict
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Sinkra Review (v0.1.3, SHA-pinned)
        # SHA pin per supply-chain hygiene. To upgrade, bump SHA + comment to
        # the corresponding tag at https://github.com/RBKunnela/sinkra-action/tags
        uses: RBKunnela/sinkra-action@af19709550dc6e9355f439a1900984e284bf3e89 # v0.1.3
        with:
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Defaults: zai-base-url, model (glm-4.6), agents (all),
          # max-diff-tokens (15000). Override here only if a repo has special needs.

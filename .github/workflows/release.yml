name: Release

# Publishes paybot-sdk to npm. Decoupled from CI per the clean-release policy:
# ordinary pushes to main run build + tests + security only (ci.yml), and the
# OSV-Scanner / CodeQL security gate is the authoritative verdict for `main`.
# Publishing is a DELIBERATE act, triggered only when a GitHub Release is
# published — so the npm publish step can only run (and only fail) when you
# intentionally cut a version, never on every commit.
#
# Guards (fail-fast / idempotent):
#   - main reachability: the released commit must be contained in origin/main,
#     so a Release cut from any other branch cannot bypass the authoritative,
#     branch-protected line.
#   - tag/version match: the Release tag (e.g. v0.3.0) must equal package.json.
#   - skip-if-already-published: re-runs are safe (no E409 on a live version).
#   - dist-tag routing: GitHub prereleases publish to the `next` npm dist-tag,
#     never to `latest`. Only stable Releases move `latest`.
#
# Requires repo secret NPM_TOKEN: an npm "Automation"/granular token with
# publish rights to `paybot-sdk`. npm returns 404 (not 403) when the token
# lacks publish permission — rotate it if publishes 404. Tokens default to a
# 90-day expiry; prefer a long/no expiry.
#
# Actions pinned to immutable SHAs per supply-chain hygiene policy (paybot-sdk
# PR #11). Adjacent version comment marks floating-tag intent for Dependabot.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for `npm publish --provenance` (OIDC); independent
                   # of actions/checkout's persisted git credentials.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false  # no git writes here; provenance uses OIDC
          fetch-depth: 0              # need history to verify reachability from main

      - name: Ensure released commit is contained in main
        run: |
          git fetch --no-tags --quiet origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::Release commit $GITHUB_SHA is not reachable from origin/main. Releases must be cut from main (the authoritative, branch-protected line)."
            exit 1
          fi
          echo "Release commit is contained in main."

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' (=> $TAG) does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
          echo "Releasing paybot-sdk@$PKG_VERSION"

      - run: npm ci
      - run: npm run build

      - name: Skip if version already published
        id: guard
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "paybot-sdk@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "paybot-sdk@${PKG_VERSION} is already on npm — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.guard.outputs.skip == 'false'
        # Prereleases go to the `next` dist-tag so they never move `latest`.
        run: npm publish --provenance --access public --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}

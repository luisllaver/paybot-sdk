name: CI

# Actions pinned to immutable SHAs per supply-chain hygiene policy (paybot-sdk
# PR #11 CodeRabbit MAJOR-level guidance). Adjacent version comment marks the
# floating-tag intent so Dependabot github-actions can offer upgrades.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Coverage gate
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

  # Publishing lives in release.yml (triggered on a published GitHub Release),
  # NOT here. CI on push/PR runs build + tests + security only, so an ordinary
  # green commit means "merged & safe" without carrying a publish status that
  # fails on every non-release push. See .github/workflows/release.yml.
